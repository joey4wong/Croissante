<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Croissante — Learn French Vocabulary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --dark: #1a1a18;
      --gold: #c9a84c;
      --gold-light: #e8d5a0;
      --muted: rgba(255,255,255,0.45);
      --border: rgba(255,255,255,0.1);
      --tf-blue: #0071e3;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #050c08;
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Star field canvas behind everything */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    nav, section, footer, .galaxy-section {
      position: relative;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5,12,8,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--cream);
      text-decoration: none;
    }

    .nav-logo span {
      font-style: italic;
      color: var(--gold);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(71,244,143,0.15);
      color: rgba(71,244,143,0.95);
      border: 1px solid rgba(71,244,143,0.35);
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.82; }
    .nav-cta svg { width: 14px; height: 14px; }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 90px 24px 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 20%, rgba(48,186,117,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Decorative French words floating */
    .french-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .french-word {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(71,244,143,0.09);
      user-select: none;
      animation: floatWord linear infinite;
    }
    @keyframes floatWord {
      0% { transform: translateY(0px); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0.6; }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(71,244,143,0.10);
      border: 1px solid rgba(71,244,143,0.28);
      color: rgba(71,244,143,0.9);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 820px;
      margin-bottom: 12px;
      animation: fadeUp 0.8s 0.1s ease both;
      color: var(--cream);
    }

    .hero-title em {
      font-style: italic;
      color: rgba(71,244,143,0.95);
    }

    .hero-sub {
      font-size: clamp(17px, 2vw, 20px);
      font-weight: 300;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 24px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(71,244,143,0.15);
      border: 1px solid rgba(71,244,143,0.4);
      color: rgba(71,244,143,0.95);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.88; }

    .btn-secondary {
      font-size: 15px;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .btn-secondary:hover { color: rgba(255,255,255,0.8); }

    /* GALAXY */
    .galaxy-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 0;
      animation: fadeUp 0.9s 0.4s ease both;
    }
    .galaxy-label {
      font-size: 12px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      font-weight: 400;
    }
    .galaxy-viewport {
      width: 100vw;
      height: 50vh;
      perspective: 1100px;
      perspective-origin: 50% 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: visible;
      background: transparent;
      cursor: grab;
      position: relative;
    }
    .galaxy-viewport:active { cursor: grabbing; }

    .galaxy-ring {
      position: relative; width: 0; height: 0;
      transform-style: preserve-3d;
    }
    .g-card {
      position: absolute;
      width: 72px; height: 100px;
      left: -36px; top: -50px;
      border-radius: 9px;
      transform-style: preserve-3d;
      backface-visibility: visible;
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 60%), rgba(8,20,14,0.90);
      border: 1.1px solid rgba(71,244,143,0.78);
      box-shadow: 0 0 10px rgba(48,186,117,0.18), 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .g-card-word {
      font-family: 'DM Sans', sans-serif;
      font-size: 9.5px; font-weight: 700;
      color: rgba(255,255,255,0.91);
      text-align: center; padding: 0 4px; line-height: 1.2; letter-spacing: 0.05em;
    }

    /* DIVIDER */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px;
      opacity: 0.3;
      margin: 8px 0;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.5);
    }
    .section-divider span {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
    }

    /* FEATURES */
    .features {
      max-width: 1040px;
      margin: 0 auto;
      padding: 100px 48px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 560px;
      margin-bottom: 64px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .feature-card {
      background: var(--cream);
      padding: 40px 36px;
      transition: background 0.3s;
    }
    .feature-card:hover { background: #f4f1eb; }

    .feature-icon {
      width: 44px;
      height: 44px;
      background: rgba(201,168,76,0.12);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .feature-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .feature-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    /* HOW IT WORKS */
    .how {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 48px 100px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px;
      margin-top: 64px;
    }

    .step-num {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 400;
      color: rgba(201,168,76,0.25);
      line-height: 1;
      margin-bottom: 16px;
    }

    .step-title {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .step-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    /* CTA */
    .cta-section {
      margin: 0 48px 80px;
      background: rgba(8,24,16,0.85);
      border: 1px solid rgba(71,244,143,0.12);
      border-radius: 28px;
      padding: 80px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,168,76,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .cta-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      color: var(--cream);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .cta-title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .cta-sub {
      font-size: 16px;
      color: rgba(250,248,244,0.5);
      margin-bottom: 40px;
      font-weight: 300;
    }

    .btn-tf {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--cream);
      color: var(--dark);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-tf:hover { transform: translateY(-2px); opacity: 0.9; }

    .tf-note {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(250,248,244,0.3);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 16px 48px;
      font-size: 13px;
      color: rgba(255,255,255,0.22);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: rgba(255,255,255,0.6); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .features, .how { padding: 60px 24px; }
      .features-grid, .steps { grid-template-columns: 1fr; }
      .cta-section { margin: 0 20px 60px; padding: 60px 28px; }
      .section-divider { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <!-- NAV -->
  <nav>
    <a href="#" class="nav-logo">Crois<span>sante</span></a>
    <a href="https://testflight.apple.com/join/qn35XAhY" class="nav-cta" target="_blank" rel="noopener">

  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>

    <!-- Floating French words decoration -->
    <div class="french-bg" aria-hidden="true">
      <span class="french-word" style="left:5%;top:20%;font-size:36px;animation-duration:8s;animation-delay:0s">bonjour</span>
      <span class="french-word" style="left:85%;top:30%;font-size:28px;animation-duration:10s;animation-delay:2s">merci</span>

    <h1 class="hero-title">

    </h1>

    <p class="hero-sub">
      One Croissante a day, one French word away.
    </p>

    <div class="hero-actions">
      <a href="https://testflight.apple.com/join/qn35XAhY" class="btn-primary" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>

  <!-- GALAXY SECTION -->
  <div class="galaxy-section">
    <div class="galaxy-viewport" id="galaxyViewport">
      <div class="galaxy-ring" id="galaxyRing"></div>
    </div>
  </div>

    <!-- FOOTER -->
  <footer>
    <p>© 2026 Croissante · <a href="https://x.com/croissante4u?s=21" target="_blank" rel="noopener">@croissante4u</a></p>
  </footer>

    <script>
    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

    // ─── CSS 3D Galaxy Ring ───────────────────────────────────────
    const WORDS = [
      'flâner','lumière','douceur','liberté','sérénité','crépuscule',
      'bonheur','sagesse','beauté','espoir','tendresse','mélodie',
      'mystère','élégance','rêverie','partager','sourire','papillon',
      'silence','voyage','nostalgie','étoile'
    ];

    const COUNT   = WORDS.length;
    const RADIUS  = 180;
    const SPEED   = 40;   // deg/sec auto-rotate

    // View angles — draggable
    let tiltX = -0.6;   // up/down (俯视)
    let tiltZ =  17.2;   // twist

    const DUST_COUNT = 9, DUST_CYCLE = 6000;

    const ring     = document.getElementById('galaxyRing');
    const viewport = document.getElementById('galaxyViewport');

    // Build cards
    const cardEls = WORDS.map((word) => {
      const el   = document.createElement('div');
      el.className = 'g-card';
      const span = document.createElement('span');
      span.className = 'g-card-word';
      span.textContent = word;
      el.appendChild(span);
      ring.appendChild(el);
      return el;
    });

    // Build dust
    const dustEls = Array.from({ length: DUST_COUNT }, () => {
      const el = document.createElement('div');
      el.className = 'g-dust';
      ring.appendChild(el);
      return el;
    });

    let orbitOffset = 0;
    let isDragging  = false, lastX = null, lastY = null;
    let inertiaX = 0, inertiaZ = 0;
    let galaxyScale = 1.0;
    frame._last = null;

    function frame(now) {
      const dt = frame._last ? Math.min((now - frame._last) / 1000, 0.05) : 0;
      frame._last = now;
      const sec = now / 1000;

      if (!isDragging) {
        orbitOffset -= SPEED * dt;
        inertiaX *= 0.90; inertiaZ *= 0.90;
        tiltX += inertiaX * dt;
        tiltZ += inertiaZ * dt;
        // Clamp view angles
        tiltX = Math.max(-70, Math.min(0, tiltX));
        tiltZ = Math.max(-40, Math.min(40, tiltZ));
      }

      // Tilt the whole ring
      ring.style.transform = `scale(${galaxyScale}) rotateX(${tiltX}deg) rotateZ(${tiltZ}deg)`;

      for (let i = 0; i < COUNT; i++) {
        const deg = orbitOffset + (i / COUNT) * 360;
        const rad = deg * Math.PI / 180;

        const x = Math.cos(rad) * RADIUS;
        const z = Math.sin(rad) * RADIUS;

        // Tangent-facing: thin edge points to center
        const tx = -Math.sin(rad) * RADIUS;
        const tz =  Math.cos(rad) * RADIUS;
        const facing = Math.atan2(tx, tz) * (180 / Math.PI);

        // Depth opacity: z in local ring space (-R=back, +R=front)
        const depthT = (z + RADIUS) / (2 * RADIUS);
        const opacity = 0.22 + 0.78 * depthT;

        cardEls[i].style.transform = `translate3d(${x}px, 0px, ${z}px) rotateY(${facing}deg)`;
        cardEls[i].style.opacity   = opacity.toFixed(3);
      }

      // Dust
      for (let i = 0; i < DUST_COUNT; i++) {
        const phase = ((now / DUST_CYCLE + i / DUST_COUNT) % 1 + 1) % 1;
        const opac  = Math.sin(Math.PI * phase) * (0.74 + 0.26 * Math.sin(sec * 0.8 + i));
        if (opac < 0.01) { dustEls[i].style.opacity = '0'; continue; }
        const ang = (orbitOffset * 0.62 * Math.PI / 180) + i * (2 * Math.PI / DUST_COUNT);
        const dx  = Math.cos(ang) * RADIUS * 0.50;
        const dz  = Math.sin(ang) * RADIUS * 0.55;
        const dy  = -72 * phase;
        const sz  = 4 + 3 * Math.sin(Math.PI * phase);
        dustEls[i].style.opacity   = opac.toFixed(3);
        dustEls[i].style.width     = sz + 'px';
        dustEls[i].style.height    = sz + 'px';
        dustEls[i].style.transform = `translate3d(${dx - sz/2}px, ${dy - sz/2}px, ${dz}px)`;
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Drag: horizontal → tiltZ, vertical → tiltX ──
    viewport.addEventListener('mousedown', e => {
      isDragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      tiltZ = Math.max(-40, Math.min(40, tiltZ + dx * 0.3));  // horizontal → tiltZ
      tiltX = Math.max(-70, Math.min(0,  tiltX - dy * 0.3));  // vertical   → tiltX
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    viewport.addEventListener('touchstart', e => {
      isDragging = true;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    viewport.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - lastX;
      const dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      tiltZ = Math.max(-40, Math.min(40, tiltZ + dx * 0.3));
      tiltX = Math.max(-70, Math.min(0,  tiltX + dy * 0.3));
      e.preventDefault();
    }, { passive: false });
    viewport.addEventListener('touchend', () => { isDragging = false; });

    // Scroll wheel → scale galaxy ring
    viewport.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.80 : 1.20;
      galaxyScale = Math.max(0.3, Math.min(3.0, galaxyScale * delta));
    }, { passive: false });

    // ─── Starfield ───────────────────────────────────────────────
    (function() {
      const sf = document.getElementById('starfield');
      const sc = sf.getContext('2d');
      let stars = [];
      let nebulae = [];

      function initStars() {
        const dpr = window.devicePixelRatio || 1;
        sf.width  = window.innerWidth  * dpr;
        sf.height = window.innerHeight * dpr;
        sc.scale(dpr, dpr);

        const W = window.innerWidth, H = window.innerHeight;
        stars = Array.from({ length: 220 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.2 + 0.2,
          a: Math.random() * 0.6 + 0.15,
          twinkleSpeed: 0.4 + Math.random() * 1.2,
          twinklePhase: Math.random() * Math.PI * 2,
          // slight green/warm tint variety
          hue: Math.random() < 0.15 ? 'rgba(150,255,200,' : 'rgba(255,255,255,'
        }));

        // Soft nebula clouds
        nebulae = [
          { x: W*0.15, y: H*0.25, rx: W*0.28, ry: H*0.22, r: 0, g: 120, b: 80, a: 0.032 },
          { x: W*0.80, y: H*0.60, rx: W*0.22, ry: H*0.18, r: 30, g: 160, b: 100, a: 0.025 },
          { x: W*0.50, y: H*0.12, rx: W*0.35, ry: H*0.14, r: 20, g: 180, b: 120, a: 0.020 },
          { x: W*0.70, y: H*0.85, rx: W*0.30, ry: H*0.16, r: 80, g: 100, b: 160, a: 0.018 },
        ];
      }
      initStars();
      window.addEventListener('resize', initStars);

      let lastSF = null;
      function drawStars(now) {
        if (!lastSF) lastSF = now;
        const dt = (now - lastSF) / 1000; lastSF = now;
        const W = window.innerWidth, H = window.innerHeight;
        sc.clearRect(0, 0, W, H);

        // nebulae
        nebulae.forEach(n => {
          const g = sc.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
          g.addColorStop(0, `rgba(${n.r},${n.g},${n.b},${n.a})`);
          g.addColorStop(1, `rgba(${n.r},${n.g},${n.b},0)`);
          sc.save();
          sc.scale(1, n.ry / n.rx);
          sc.beginPath();
          sc.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI*2);
          sc.fillStyle = g; sc.fill();
          sc.restore();
        });

        // stars
        const t = now / 1000;
        stars.forEach(s => {
          const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase);
          const alpha = s.a * (0.55 + 0.45 * twinkle);
          sc.beginPath();
          sc.arc(s.x, s.y, s.r, 0, Math.PI*2);
          sc.fillStyle = s.hue + alpha.toFixed(3) + ')';
          sc.fill();

          // tiny glow on brighter stars
          if (s.r > 0.9 && twinkle > 0.7) {
            const grd = sc.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
            grd.addColorStop(0, s.hue + (alpha * 0.4).toFixed(3) + ')');
            grd.addColorStop(1, 'rgba(255,255,255,0)');
            sc.beginPath();
            sc.arc(s.x, s.y, s.r * 4, 0, Math.PI*2);
            sc.fillStyle = grd; sc.fill();
          }
        });
        requestAnimationFrame(drawStars);
      }
      requestAnimationFrame(drawStars);
    })();
  </script>
</body>
