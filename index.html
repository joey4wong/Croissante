  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --dark: #1a1a18;
      --gold: #c9a84c;
      --gold-light: #e8d5a0;
      --muted: rgba(255,255,255,0.45);
      --border: rgba(255,255,255,0.1);
      --tf-blue: #0071e3;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #050c08;
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Star field canvas behind everything */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    nav, section, footer, .galaxy-section {
      position: relative;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
    }

    .nav-logo span {
      font-style: italic;
      color: var(--gold);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(71,244,143,0.10);
      color: rgba(71,244,143,0.88);
      border: 1px solid rgba(71,244,143,0.25);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }
    .nav-cta:hover { background: rgba(71,244,143,0.18); border-color: rgba(71,244,143,0.45); }
    .nav-cta svg { width: 14px; height: 14px; }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 90px 24px 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 20%, rgba(48,186,117,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Decorative French words floating */
    .french-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .french-word {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(71,244,143,0.09);
      user-select: none;
      animation: floatWord linear infinite;
    }
    @keyframes floatWord {
      0% { transform: translateY(0px); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0.6; }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(71,244,143,0.10);
      border: 1px solid rgba(71,244,143,0.28);
      color: rgba(71,244,143,0.9);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 820px;
      margin-bottom: 12px;
      animation: fadeUp 0.8s 0.1s ease both;
      color: var(--cream);
    }

    .hero-title em {
      font-style: italic;
      color: rgba(71,244,143,0.95);
    }

    .hero-sub {
      font-size: clamp(17px, 2vw, 20px);
      font-weight: 300;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 24px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(71,244,143,0.15);
      border: 1px solid rgba(71,244,143,0.4);
      color: rgba(71,244,143,0.95);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.88; }

    .btn-secondary {
      font-size: 15px;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .btn-secondary:hover { color: rgba(255,255,255,0.8); }

    /* GALAXY */
    .galaxy-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 0;
      animation: fadeUp 0.9s 0.4s ease both;
    }
    .galaxy-label {
      font-size: 12px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      font-weight: 400;
    }
    .galaxy-viewport {
      width: 100vw;
      height: 50vh;
      perspective: 1100px;
      perspective-origin: 50% 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: visible;
      background: transparent;
      cursor: grab;
      position: relative;
    }
    .galaxy-viewport:active { cursor: grabbing; }

    .galaxy-ring {
      position: relative; width: 0; height: 0;
      transform-style: preserve-3d;
    }
    .g-card {
      position: absolute;
      width: 72px; height: 100px;
      left: -36px; top: -50px;
      opacity: 0;
      border-radius: 9px;

    /* CTA */

    .cta-bg {

      pointer-events: none;

    .cta-label {
      font-size: 12px;

    .cta-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);

    .cta-title em {

    .cta-sub {

    .btn-tf {

    .tf-note {

    /* FOOTER */
    footer {
      text-align: center;

      border-top: 1px solid rgba(255,255,255,0.07);
    }

    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: rgba(255,255,255,0.6); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .features, .how { padding: 60px 24px; }
      .features-grid, .steps { grid-template-columns: 1fr; }
      .cta-section { margin: 0 20px 60px; padding: 60px 28px; }
      .section-divider { padding: 0 24px; }
    }
  </style>

<body>

  <canvas id="starfield"></canvas>

  <!-- NAV -->

  <!-- GALAXY SECTION -->
  <div class="galaxy-section">
    <div class="galaxy-viewport" id="galaxyViewport">
      <div class="galaxy-ring" id="galaxyRing"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Croissante · <a href="https://x.com/croissante4u?s=21" target="_blank" rel="noopener">@croissante4u</a> · <a href="support.html">Support</a> · <a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Use</a></p>

    <script>
    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

    // ─── CSS 3D Galaxy Ring ───────────────────────────────────────
    const WORDS = [
      'flâner','lumière','douceur','liberté','sérénité','crépuscule',
      'bonheur','sagesse','beauté','espoir','tendresse','mélodie',
      'mystère','élégance','rêverie','partager','sourire','papillon',
      'silence','voyage','nostalgie','étoile'
    ];

    const COUNT        = WORDS.length;
    const RADIUS       = 180;
    const SPEED        = 60;             // deg/sec auto-rotate

    // Deal / entrance animation — mirroring Swift constants
    const PILE_ANGLE          = Math.PI * 0.65;
    const DEAL_DURATION       = 1.4;     // seconds
    const DEAL_STAGGER        = 0.028;   // per card, as fraction of DEAL_DURATION
    const COMPRESSED_STEPS    = 3.0;
    const COMPRESSED_POWER    = 0.82;
    const DEPTH_Z_SWITCH      = 0.42;

    // View angles
    let tiltX = -19.5;
    let tiltZ  = 26.2;

    const DUST_COUNT = 9, DUST_CYCLE = 6000;

    const ring     = document.getElementById('galaxyRing');
    const viewport = document.getElementById('galaxyViewport');

    // Build cards
    const cardEls = WORDS.map((word, i) => {
      const el   = document.createElement('div');
      el.className = 'g-card';
      el.style.zIndex = COUNT - i;   // initial deal z-order
      const span = document.createElement('span');
      span.className = 'g-card-word';
      span.textContent = word;
      el.appendChild(span);
      ring.appendChild(el);
      return el;
    });

    // Build dust
    const dustEls = Array.from({ length: DUST_COUNT }, () => {
      const el = document.createElement('div');
      el.className = 'g-dust';
      ring.appendChild(el);
      return el;
    });

    // Easing
    function smoothStep(t) {
      t = Math.min(1, Math.max(0, t));
      return t * t * (3 - 2 * t);
    }
    function lerp(a, b, t) { return a + (b - a) * t; }

    let orbitOffset  = 0;
    let startTime    = null;
    let animReady    = false;
    setTimeout(() => { animReady = true; }, 120); // wait for page paint
    let isDragging   = false, lastX = null, lastY = null;
    frame._last      = null;

    function frame(now) {
      if (!animReady) { requestAnimationFrame(frame); return; }
      if (!startTime) startTime = now;
      const elapsed = (now - startTime) / 1000;   // seconds since page load
      const dt = frame._last ? Math.min((now - frame._last) / 1000, 0.05) : 0;
      frame._last = now;

      if (!isDragging) orbitOffset -= SPEED * dt;

      ring.style.transform = `scale(${galaxyScale}) rotateX(${tiltX}deg) rotateZ(${tiltZ}deg)`;

      // Exact Swift logic
      const orbitStep      = 2 * Math.PI / COUNT;
      const orbitRad       = orbitOffset * Math.PI / 180;
      const dealProgress   = Math.min(1, Math.max(0, elapsed / DEAL_DURATION));
      const compressedSpan = COMPRESSED_STEPS * orbitStep;
      const maxSlot        = Math.max(COUNT - 1, 1);

      for (let i = 0; i < COUNT; i++) {
        const releaseRank  = i;
        const orbitRank    = i;                    // card 0 → nearest, last card → farthest CCW
        const slotFraction = i / maxSlot;

        // Staggered local progress — mirrors Swift dealStaggerPerCard logic
        const localDelay   = (releaseRank * DEAL_STAGGER) / DEAL_DURATION;
        const rawLocal     = Math.min(1, Math.max(0,
          (dealProgress - localDelay) / Math.max(1 - localDelay, 0.001)
        ));
        const openProgress = smoothStep(rawLocal);

        // Start: compressed fan around pileAngle
        // End:   evenly spaced orbit (card 0 goes farthest CCW)
        // Negate both so deal fans clockwise, matching orbit rotation direction
        const compressedOffset = -(compressedSpan / 2
          - Math.pow(slotFraction, COMPRESSED_POWER) * compressedSpan);
        const finalOffset = -orbitRank * orbitStep;
        const angle = PILE_ANGLE + orbitRad
          + lerp(compressedOffset, finalOffset, openProgress);

        const x  = Math.cos(angle) * RADIUS;
        const z  = Math.sin(angle) * RADIUS;
        const tx = -Math.sin(angle) * RADIUS;
        const tz =  Math.cos(angle) * RADIUS;
        const facing = Math.atan2(tx, tz) * (180 / Math.PI);

        const depthT  = (z + RADIUS) / (2 * RADIUS);
        const opacity = openProgress < 0.01 ? 0 : (0.22 + 0.78 * depthT);

        cardEls[i].style.zIndex = openProgress < DEPTH_Z_SWITCH
          ? COUNT - releaseRank
          : Math.round(100 + z);
        cardEls[i].style.transform = `translate3d(${x}px, 0px, ${z}px) rotateY(${facing}deg)`;
        cardEls[i].style.opacity   = opacity.toFixed(3);
      }

      // Dust
      const sec = now / 1000;
      for (let i = 0; i < DUST_COUNT; i++) {
        const phase = ((now / DUST_CYCLE + i / DUST_COUNT) % 1 + 1) % 1;
        const opac  = Math.sin(Math.PI * phase) * (0.74 + 0.26 * Math.sin(sec * 0.8 + i));
        if (opac < 0.01) { dustEls[i].style.opacity = '0'; continue; }
        const ang = (orbitOffset * 0.62 * Math.PI / 180) + i * (2 * Math.PI / DUST_COUNT);
        const dx  = Math.cos(ang) * RADIUS * 0.50;
        const dz  = Math.sin(ang) * RADIUS * 0.55;
        const dy  = -72 * phase;
        const sz  = 4 + 3 * Math.sin(Math.PI * phase);
        dustEls[i].style.opacity   = opac.toFixed(3);
        dustEls[i].style.width     = sz + 'px';
        dustEls[i].style.height    = sz + 'px';
        dustEls[i].style.transform = `translate3d(${dx - sz/2}px, ${dy - sz/2}px, ${dz}px)`;
      }

      requestAnimationFrame(frame);
    }

    let galaxyScale = window.innerWidth < 768 ? 0.55 : 1.0;
    requestAnimationFrame(frame);

    // Drag: horizontal → tiltZ, vertical → tiltX
    viewport.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      tiltZ = Math.max(-40, Math.min(40, tiltZ + dx * 0.3));
      tiltX = Math.max(-70, Math.min(0,  tiltX - dy * 0.3));
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    viewport.addEventListener('touchstart', e => {
      isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    viewport.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      tiltZ = Math.max(-40, Math.min(40, tiltZ + dx * 0.3));
      tiltX = Math.max(-70, Math.min(0,  tiltX - dy * 0.3));
      e.preventDefault();
    }, { passive: false });
    viewport.addEventListener('touchend', () => { isDragging = false; });

    viewport.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.80 : 1.20;
      galaxyScale = Math.max(0.3, Math.min(3.0, galaxyScale * delta));
    }, { passive: false });

    // ─── Starfield ───────────────────────────────────────────────
    (function() {
      const sf = document.getElementById('starfield');
      const sc = sf.getContext('2d');
      let stars = [];
      let nebulae = [];

      function initStars() {
        const dpr = window.devicePixelRatio || 1;
        sf.width  = window.innerWidth  * dpr;
        sf.height = window.innerHeight * dpr;
        sc.scale(dpr, dpr);

        const W = window.innerWidth, H = window.innerHeight;
        stars = Array.from({ length: 220 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.2 + 0.2,
          a: Math.random() * 0.6 + 0.15,
          twinkleSpeed: 0.4 + Math.random() * 1.2,
          twinklePhase: Math.random() * Math.PI * 2,
          // slight green/warm tint variety
          hue: Math.random() < 0.15 ? 'rgba(150,255,200,' : 'rgba(255,255,255,'
        }));

        // Soft nebula clouds
        nebulae = [
          { x: W*0.15, y: H*0.25, rx: W*0.28, ry: H*0.22, r: 0, g: 120, b: 80, a: 0.032 },
          { x: W*0.80, y: H*0.60, rx: W*0.22, ry: H*0.18, r: 30, g: 160, b: 100, a: 0.025 },
          { x: W*0.50, y: H*0.12, rx: W*0.35, ry: H*0.14, r: 20, g: 180, b: 120, a: 0.020 },
          { x: W*0.70, y: H*0.85, rx: W*0.30, ry: H*0.16, r: 80, g: 100, b: 160, a: 0.018 },
        ];
      }
      initStars();
      window.addEventListener('resize', initStars);

      let lastSF = null;
      function drawStars(now) {
        if (!lastSF) lastSF = now;
        const dt = (now - lastSF) / 1000; lastSF = now;
        const W = window.innerWidth, H = window.innerHeight;
        sc.clearRect(0, 0, W, H);

        // nebulae
        nebulae.forEach(n => {
          const g = sc.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
          g.addColorStop(0, `rgba(${n.r},${n.g},${n.b},${n.a})`);
          g.addColorStop(1, `rgba(${n.r},${n.g},${n.b},0)`);
          sc.save();
          sc.scale(1, n.ry / n.rx);
          sc.beginPath();
          sc.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI*2);
          sc.fillStyle = g; sc.fill();
          sc.restore();
        });

        // stars
        const t = now / 1000;
        stars.forEach(s => {
          const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase);
          const alpha = s.a * (0.55 + 0.45 * twinkle);
          sc.beginPath();
          sc.arc(s.x, s.y, s.r, 0, Math.PI*2);
          sc.fillStyle = s.hue + alpha.toFixed(3) + ')';
          sc.fill();

          // tiny glow on brighter stars
          if (s.r > 0.9 && twinkle > 0.7) {
            const grd = sc.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
            grd.addColorStop(0, s.hue + (alpha * 0.4).toFixed(3) + ')');
            grd.addColorStop(1, 'rgba(255,255,255,0)');
            sc.beginPath();
            sc.arc(s.x, s.y, s.r * 4, 0, Math.PI*2);
            sc.fillStyle = grd; sc.fill();
          }
        });
        requestAnimationFrame(drawStars);
      }
      requestAnimationFrame(drawStars);
    })();
  </script>
